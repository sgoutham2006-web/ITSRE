<!DOCTYPE html>
<html>

<head>
    <title>AI Academic Intelligence Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-light: #f8fafc;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-heading: #0f172a;
            --text-main: #334155;
            --text-muted: #64748b;
            --input-bg: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            color: var(--text-main);
            position: relative;
            overflow-x: hidden;
        }

        /* Decorative Background Elements */
        body::before {
            content: '';
            position: absolute;
            top: 10%;
            left: 5%;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #dbeafe, #e0e7ff);
            filter: blur(100px);
            border-radius: 50%;
            z-index: 0;
            opacity: 0.8;
            animation: float 20s infinite alternate ease-in-out;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: 10%;
            right: 5%;
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #fce7f3, #fae8ff);
            filter: blur(100px);
            border-radius: 50%;
            z-index: 0;
            opacity: 0.8;
            animation: float 25s infinite alternate ease-in-out reverse;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(40px, -40px) scale(1.05);
            }
        }

        /* MAIN CONTAINER */
        .container {
            width: 100%;
            max-width: 900px;
            position: relative;
            z-index: 1;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: var(--card-bg);
            padding: 24px 32px;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 20px 40px -12px rgba(15, 23, 42, 0.05);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-heading);
            letter-spacing: -0.5px;
        }

        .header h1 svg {
            color: var(--primary);
        }

        .logout {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            background: #fee2e2;
            color: #b91c1c;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout:hover {
            background: #fecaca;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.1);
            transform: translateY(-1px);
        }

        /* SEARCH */
        .search-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            /* subtle shine */
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 20px 40px -12px rgba(15, 23, 42, 0.05);
            position: relative;
        }

        .search-box input {
            flex: 1;
            padding: 16px 20px;
            border: 1px solid var(--card-border);
            border-radius: 14px;
            background: var(--input-bg);
            color: var(--text-heading);
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        .search-box button {
            padding: 0 30px;
            border: none;
            border-radius: 14px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 14px 0 rgba(37, 99, 235, 0.39);
        }

        .search-box button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.23);
        }

        .search-box button:active {
            transform: translateY(0);
        }

        /* STUDENT CARD */
        .student-card {
            display: none;
            background: var(--card-bg);
            padding: 35px;
            border-radius: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 20px 40px -12px rgba(15, 23, 42, 0.05);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .student-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--card-border);
        }

        .student-info h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text-heading);
            letter-spacing: -0.5px;
        }

        .student-info p {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .badge {
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: inline-block;
        }

        /* SUBJECT GRID */
        h3.section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-heading);
        }

        .subjects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .subject-card {
            background: var(--input-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--card-border);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .subject-card:hover {
            transform: translateY(-4px);
            background: #ffffff;
            border-color: #cbd5e1;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .subject-card b {
            display: block;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .subject-card p {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--text-heading);
            letter-spacing: -1px;
        }

        .progress {
            background: #e2e8f0;
            height: 6px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress span {
            display: block;
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* AI BOX */
        .ai-box {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.05), rgba(139, 92, 246, 0.08));
            padding: 25px 30px;
            border-radius: 20px;
            border: 1px solid rgba(139, 92, 246, 0.15);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s ease;
        }

        .ai-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--primary), var(--accent));
        }

        .ai-box h3 {
            margin-bottom: 12px;
            color: var(--accent);
            /* darker tone of violet */
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
        }

        .ai-box p {
            line-height: 1.6;
            font-size: 15px;
            color: var(--text-heading);
            font-weight: 500;
        }

        /* LOADER */
        .loader {
            display: none;
            text-align: center;
            margin-top: 50px;
            margin-bottom: 50px;
            animation: fadeIn 0.3s ease;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(37, 99, 235, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            margin: 0 auto 20px auto;
            animation: spin 1s linear infinite;
        }

        .loader p {
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .search-box {
                flex-direction: column;
            }

            .search-box button {
                padding: 16px;
            }

            .student-info {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>
                <svg fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                EduAI Student Portal
            </h1>
            <button class="logout" onclick="logout()">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                    </path>
                </svg>
                Logout
            </button>
        </div>

        <div class="search-box">
            <input id="roll" placeholder="Enter Registration / Roll Number (e.g. 101-113)"
                onkeypress="event.key === 'Enter' && fetchData()">
            <button onclick="fetchData()">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                Analyze
            </button>
        </div>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>AI Fetching SQL Data...</p>
        </div>

        <div id="studentCard" class="student-card"></div>

        <div id="aiBox" class="ai-box" style="display:none;"></div>

    </div>

    <script>
        if (localStorage.getItem("role") !== "student") {
            window.location.href = "/";
        }

        async function fetchData() {
            let roll = document.getElementById("roll").value.trim().toLowerCase();
            let loader = document.getElementById("loader");
            let card = document.getElementById("studentCard");
            let aiBox = document.getElementById("aiBox");

            card.style.display = "none";
            aiBox.style.display = "none";
            loader.style.display = "block";

            let token = localStorage.getItem("token");

            try {
                let res = await fetch('/api/students/' + roll, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (!res.ok) {
                    loader.style.display = "none";
                    alert("Student not found in SQL Database or Unauthorized.");
                    return;
                }

                let student = await res.json();

                let subjects = ["Tamil", "English", "Maths", "Physics", "Chemistry"];
                let marks = [student.tamil, student.english, student.maths, student.physics, student.chemistry].map(Number);

                let avg = marks.reduce((a, b) => a + b) / marks.length;
                let weighted = (avg * 0.7) + (student.attendance * 0.3);

                let level = "";
                let colorClass = "";

                if (weighted < 45) { level = "High Risk"; colorClass = "background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca" }
                else if (weighted < 65) { level = "Needs Improvement"; colorClass = "background: #fef3c7; color: #d97706; border: 1px solid #fde68a" }
                else if (weighted < 80) { level = "Stable Performer"; colorClass = "background: #d1fae5; color: #047857; border: 1px solid #a7f3d0" }
                else { level = "Academic Excellence"; colorClass = "background: #dbeafe; color: #1d4ed8; border: 1px solid #bfdbfe" }

                card.innerHTML = `
<div class="student-info">
    <div>
        <h2>${student.name}</h2>
        <p>Registration No: <b>${student.roll}</b></p>
        <p>Attendance Record: <b>${student.attendance}%</b></p>
    </div>
    <div>
        <span class="badge" style="${colorClass}">
            ${level}
        </span>
    </div>
</div>

<h3 class="section-title">Academic Details</h3>
<div class="subjects">
${subjects.map((s, i) => `
<div class="subject-card">
<b>${s}</b>
<p>${marks[i]}%</p>
<div class="progress">
<span style="width:${marks[i]}%"></span>
</div>
</div>
`).join("")}
</div>
`;

                let suggestion = "";

                if (level === "High Risk") {
                    suggestion = "Immediate remedial classes and parental intervention recommended. Please focus on fundamental concepts.";
                }
                else if (level === "Needs Improvement") {
                    suggestion = "Weekly assignments and close monitoring suggested. Try using alternative learning methods such as audio/visual tools.";
                }
                else if (level === "Stable Performer") {
                    suggestion = "Encourage analytical thinking and problem-solving to push marks toward the distinction tier.";
                }
                else {
                    suggestion = "Excellent work. We recommend participating in olympiads, independent research projects, and competitive exams.";
                }

                aiBox.innerHTML = `
<h3>
    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
    AI Academic Strategy
</h3>
<p>${suggestion}</p>
`;

                loader.style.display = "none";
                card.style.display = "block";
                aiBox.style.display = "block";

            } catch (err) {
                loader.style.display = "none";
                alert("Server Connection Error");
            }
        }

        function logout() {
            localStorage.removeItem("role");
            localStorage.removeItem("token");
            window.location.href = "/";
        }
    </script>
</body>

</html>
