<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>

    <style>
        body{
            font-family: Arial;
            margin:0;
            background:#f4f6f9;
        }

        .header{
            background:#6c5ce7;
            color:white;
            padding:20px;
            text-align:center;
        }

        .container{
            display:flex;
        }

        .sidebar{
            width:250px;
            background:#4834d4;
            min-height:100vh;
            padding-top:20px;
        }

        .sidebar button{
            width:90%;
            margin:10px;
            padding:12px;
            border:none;
            background:#5f27cd;
            color:white;
            cursor:pointer;
        }

        .sidebar button:hover{
            background:#00cec9;
        }

        .content{
            flex:1;
            padding:40px;
        }

        .section{
            background:white;
            padding:20px;
            border-radius:8px;
            margin-bottom:20px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .logout{
            background:red !important;
        }

        input, textarea{
            width:100%;
            padding:8px;
            margin:8px 0;
        }

        button.submit-btn{
            background:#6c5ce7;
            color:white;
            padding:10px;
            border:none;
            cursor:pointer;
        }

        table{
            width:100%;
            border-collapse: collapse;
            margin-top:20px;
        }

        table, th, td{
            border:1px solid #ddd;
        }

        th, td{
            padding:10px;
            text-align:center;
        }

        th{
            background:#6c5ce7;
            color:white;
        }

    </style>
</head>

<body>

<div class="header">
    <h1>Teacher Dashboard 👩‍🏫</h1>
</div>

<div class="container">

    <div class="sidebar">
        <button onclick="showSection('performance')">Student Data Entry</button>
        <button onclick="showSection('insights')">Student Insights</button>
        <button class="logout" onclick="logout()">Logout</button>
    </div>

    <div class="content">

        <div id="performance" class="section">
            <h2>Student Data Entry</h2>

            <input type="text" id="name" placeholder="Student Name">
            <input type="number" id="marks" placeholder="Marks (0-100)">
            <input type="number" id="attendance" placeholder="Attendance (%)">
            <textarea id="behavior" placeholder="Learning Behavior Details"></textarea>

            <button class="submit-btn" onclick="saveStudent()">Save Data</button>

            <table id="studentTable">
                <tr>
                    <th>Name</th>
                    <th>Marks</th>
                    <th>Attendance</th>
                    <th>Behavior</th>
                    <th>Category</th>
                </tr>
            </table>
        </div>

        <div id="insights" class="section" style="display:none;">
            <h2>Student Insights</h2>
            <p>✔ Individual Student Analysis</p>
            <p>✔ Learning Style Prediction</p>
            <p>✔ Weak Area Identification</p>
        </div>

    </div>

</div>

<script>

function showSection(id){
    let sections = document.getElementsByClassName("section");
    for(let i=0; i<sections.length; i++){
        sections[i].style.display="none";
    }
    document.getElementById(id).style.display="block";
}

function logout(){
    window.location.href = "login.html";
}

function saveStudent(){

    let name = document.getElementById("name").value;
    let marks = document.getElementById("marks").value;
    let attendance = document.getElementById("attendance").value;
    let behavior = document.getElementById("behavior").value;

    if(name === "" || marks === "" || attendance === ""){
        alert("Please fill all fields!");
        return;
    }

    let category = "";

    if(marks < 40){
        category = "Slow Learner";
    } else if(marks < 75){
        category = "Average Learner";
    } else {
        category = "Advanced Learner";
    }

    let table = document.getElementById("studentTable");
    let row = table.insertRow(-1);

    row.insertCell(0).innerHTML = name;
    row.insertCell(1).innerHTML = marks;
    row.insertCell(2).innerHTML = attendance + "%";
    row.insertCell(3).innerHTML = behavior;
    row.insertCell(4).innerHTML = category;

    alert("Student Data Saved Successfully!");

    document.getElementById("name").value="";
    document.getElementById("marks").value="";
    document.getElementById("attendance").value="";
    document.getElementById("behavior").value="";
}

</script>

</body>
</html>
