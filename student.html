<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard - Intelligent Teaching System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            background: linear-gradient(135deg,#6c5ce7,#00cec9);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .app{
            width:95%;
            max-width:900px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border-radius:20px;
            padding:40px;
            box-shadow:0 20px 50px rgba(0,0,0,0.2);
        }

        .card{
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
        }

        h2{
            margin-bottom:20px;
            color:#6c5ce7;
            text-align:center;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border-radius:8px;
            border:1px solid #ddd;
        }

        .btn{
            background:#6c5ce7;
            color:white;
            padding:10px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
            width:100%;
        }

        .btn:hover{
            background:#00cec9;
        }

        .badge{
            padding:5px 10px;
            border-radius:20px;
            color:white;
            font-size:12px;
        }

        .slow{ background:#e74c3c; }
        .average{ background:#f39c12; }
        .advanced{ background:#2ecc71; }

        #studentDetails{
            margin-top:20px;
        }

    </style>
</head>

<body>

<div class="app">
    <div class="card">
        <h2>🎓 Student Dashboard</h2>

        <input type="text" id="searchId" placeholder="Enter Your Student ID">
        <button class="btn" onclick="viewStudent()">View Details</button>

        <div id="studentDetails"></div>
    </div>
</div>

<script>

// Demo student data
let students = [
    {id:"101", name:"Rahul", marks:35},
    {id:"102", name:"Priya", marks:65},
    {id:"103", name:"Arjun", marks:88},
    {id:"104", name:"Aswin", marks:25},
    {id:"105", name:"Dinesh", marks:60},
    {id:"106", name:"Mahilan", marks:90},
    {id:"107", name:"Suresh", marks:35},
    {id:"108", name:"Vijay", marks:65},
    {id:"109", name:"Kavitha", marks:92},
    {id:"110", name:"Ramesh", marks:39},
    {id:"111", name:"Naveen", marks:50}
];

function viewStudent(){

    let searchId = document.getElementById("searchId").value.trim();
    let result = students.find(s => s.id === searchId);

    if(!result){
        document.getElementById("studentDetails").innerHTML =
        "<p style='color:red; text-align:center;'>No record found!</p>";
        return;
    }

    let category = "";
    let recommendation = "";
    let badgeClass = "";

    // Auto categorize based on marks
    if(result.marks < 40){
        category = "Slow Learner";
        recommendation = "Use visual aids and attend one-to-one mentoring sessions.";
        badgeClass = "slow";
    }
    else if(result.marks < 75){
        category = "Average Learner";
        recommendation = "Participate in group discussions and practice regularly.";
        badgeClass = "average";
    }
    else{
        category = "Advanced Learner";
        recommendation = "Take advanced projects and research-based assignments.";
        badgeClass = "advanced";
    }

    document.getElementById("studentDetails").innerHTML =
    `<div class="card">
        <h3>${result.name}</h3>
        <p><b>Marks:</b> ${result.marks}</p>
        <p><b>Category:</b> 
           <span class="badge ${badgeClass}">
           ${category}</span>
        </p>
        <p><b>AI Recommendation:</b> ${recommendation}</p>
    </div>`;
}

</script>

</body>
</html>
